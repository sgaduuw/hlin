{% extends "base.html" %}
{% block title %}Log in - hlin{% endblock %}
{% block content %}
<article style="max-width: 24rem; margin: 2rem auto;">
  <hgroup>
    <h1>Log in</h1>
    <p>Editing the household records requires a login.</p>
  </hgroup>
  {% if error %}<p><mark>{{ error }}</mark></p>{% endif %}
  <form method="post" action="{{ url_for('auth.login_submit') }}">
    <input type="hidden" name="next" value="{{ next }}">
    <input name="username" placeholder="username" autocomplete="username" required autofocus>
    <input name="password" type="password" placeholder="password" autocomplete="current-password" required>
    <button type="submit">Log in</button>
  </form>
</article>
{% endblock %}
